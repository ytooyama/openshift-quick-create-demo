schemaVersion: 2.2.0
metadata:
  name: flask-todo-devfile

components:
  - name: app-image
    image:
      imageName: quay.io/ytooyama/flask-todo:latest
      dockerfile:
        uri: Dockerfile
        buildContext: .

  - name: app-deployment
    kubernetes:
      uri: k8s/deployment.yaml

  - name: app-service
    kubernetes:
      uri: k8s/service.yaml

  - name: app-route
    kubernetes:
      uri: k8s/route.yaml

commands:
  - id: build-image
    apply:
      component: app-image
      group:
        kind: build
        isDefault: true

  - id: deploy-app
    apply:
      component: app-deployment

  - id: expose-service
    apply:
      component: app-service

  - id: expose-route
    apply:
      component: app-route

  - id: deploy-k8s
    composite:
      commands:
        - deploy-app
        - expose-service
        - expose-route

  - id: deploy
    composite:
      commands:
        - build-image
        - deploy-k8s
      group:
        kind: deploy
        isDefault: true
