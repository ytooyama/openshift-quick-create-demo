schemaVersion: 2.2.0
metadata:
  name: flask-todo-devfile
variables:
  CONTAINER_IMAGE: image-registry.openshift-image-registry.svc:5000/{{PROJECT_NAME}}/flask-todo:latest

components:
  - name: runtime
    container:
      image: registry.access.redhat.com/ubi9/python-311:latest
      mountSources: true
      endpoints:
        - name: http-8080
          targetPort: 8080
          exposure: public

  - name: app-image
    image:
      imageName: "{{CONTAINER_IMAGE}}"
      dockerfile:
        uri: ./Dockerfile
        buildContext: ${PROJECTS_ROOT}

  - name: app-deployment
    kubernetes:
      uri: k8s/deployment.yaml

  - name: app-service
    kubernetes:
      uri: k8s/service.yaml

  - name: app-route
    kubernetes:
      uri: k8s/route.yaml

commands:
  - id: build-image
    apply:
      component: app-image
    group:
      kind: build
      isDefault: true

  - id: install-deps
    exec:
      component: runtime
      commandLine: pip install -r requirements.txt
      workingDir: "{{PROJECT_SOURCE}}"

  - id: run-app
    exec:
      component: runtime
      commandLine: python app.py
      workingDir: "{{PROJECT_SOURCE}}"
    group:
      kind: run
      isDefault: true

  - id: deploy-app
    apply:
      component: app-deployment

  - id: expose-service
    apply:
      component: app-service

  - id: expose-route
    apply:
      component: app-route

  - id: deploy-k8s
    composite:
      commands:
        - deploy-app
        - expose-service
        - expose-route

  - id: deploy
    composite:
      commands:
        - build-image
        - deploy-k8s
    group:
      kind: deploy
      isDefault: true

events:
  postStart:
    - install-deps
