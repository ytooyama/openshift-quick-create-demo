schemaVersion: 2.2.0
metadata:
  name: flask-todo-devfile

components:
  - name: app-image
    image:
      imageName: quay.io/ytooyama/flask-todo:latest
      dockerfile:
        uri: Dockerfile
        buildContext: .

  - name: app-deployment
    kubernetes:
      uri: k8s/deployment.yaml

commands:
  - id: build
    apply:
      component: app-image
      group:
        kind: build
        isDefault: true

  - id: deploy
    apply:
      component: app-deployment
      group:
        kind: deploy
        isDefault: true
